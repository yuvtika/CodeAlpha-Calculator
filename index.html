<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern, premium calculator with arithmetic operations, keyboard support, and elegant glassmorphism design." />
  <title>CalcPro — Modern Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="background-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="calculator-container">
    <div class="calculator" role="application" aria-label="Calculator">
      <!-- Display -->
      <div class="display" id="display">
        <div class="display-expression" id="display-expression" aria-live="polite"></div>
        <div class="display-result" id="display-result" aria-live="assertive">0</div>
      </div>

      <!-- Button Grid -->
      <div class="btn-grid" id="btn-grid">
        <!-- Row 1 -->
        <button class="btn btn-utility" id="btn-clear" data-action="clear" aria-label="Clear all">AC</button>
        <button class="btn btn-utility" id="btn-backspace" data-action="backspace" aria-label="Backspace">⌫</button>
        <button class="btn btn-utility" id="btn-percent" data-action="percent" aria-label="Percent">%</button>
        <button class="btn btn-operator" id="btn-divide" data-action="operator" data-value="÷" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-number" id="btn-7" data-action="number" data-value="7">7</button>
        <button class="btn btn-number" id="btn-8" data-action="number" data-value="8">8</button>
        <button class="btn btn-number" id="btn-9" data-action="number" data-value="9">9</button>
        <button class="btn btn-operator" id="btn-multiply" data-action="operator" data-value="×" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-number" id="btn-4" data-action="number" data-value="4">4</button>
        <button class="btn btn-number" id="btn-5" data-action="number" data-value="5">5</button>
        <button class="btn btn-number" id="btn-6" data-action="number" data-value="6">6</button>
        <button class="btn btn-operator" id="btn-subtract" data-action="operator" data-value="−" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-number" id="btn-1" data-action="number" data-value="1">1</button>
        <button class="btn btn-number" id="btn-2" data-action="number" data-value="2">2</button>
        <button class="btn btn-number" id="btn-3" data-action="number" data-value="3">3</button>
        <button class="btn btn-operator" id="btn-add" data-action="operator" data-value="+" aria-label="Add">+</button>

        <!-- Row 5 -->
        <button class="btn btn-number btn-zero" id="btn-0" data-action="number" data-value="0">0</button>
        <button class="btn btn-number" id="btn-decimal" data-action="decimal" data-value=".">.</button>
        <button class="btn btn-equals" id="btn-equals" data-action="equals" aria-label="Equals">=</button>
      </div>

      <!-- Keyboard hint -->
      <div class="keyboard-hint" aria-hidden="true">
        <span class="hint-icon">⌨</span> Keyboard supported
      </div>
    </div>
  </main>

  <script src="calculator.js"></script>
</body>
</html>
